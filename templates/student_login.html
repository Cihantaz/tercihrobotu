<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ t["page_title"] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #f4f8fc 0%, #e6eef6 100%);
            color: #16324b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-shell {
            width: min(100%, 520px);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(22, 50, 75, 0.08);
            border-radius: 28px;
            box-shadow: 0 26px 50px rgba(22, 50, 75, 0.12);
            padding: 28px;
        }
        .brand-logo {
            display: block;
            max-width: 220px;
            width: 100%;
            margin: 0 auto 18px;
        }
        .guide-link {
            text-decoration: none;
        }
        .guide-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .consent-box {
            background: #f6f9fc;
            border: 1px solid rgba(22, 50, 75, 0.08);
            border-radius: 16px;
            padding: 14px 16px;
        }
        .consent-box a {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <img src="{{ url_for('static', filename='iu.logo.png') }}" alt="Isik Universitesi Logo" class="brand-logo">
            <div class="guide-row">
                <a href="{{ url_for('kullanim_klavuzu', lang=lang) }}" target="_blank" class="guide-link">{{ t["guide_button"] }}</a>
                <div class="d-flex align-items-center gap-2">
                    <div class="w-auto">
                        <label for="lang-switch" class="form-label mb-1 small text-secondary">{{ t["language_label"] }}</label>
                        <select id="lang-switch" name="lang_switch" class="form-select form-select-sm">
                            <option value="tr" {% if lang == 'tr' %}selected{% endif %}>{{ t["language_tr"] }}</option>
                            <option value="en" {% if lang == 'en' %}selected{% endif %}>{{ t["language_en"] }}</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="text-center mb-4">
                <h1 class="h3 mb-2">{{ t["brand_title"] }}</h1>
                <p class="text-secondary mb-0">{{ t["login_prompt"] }}</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-3">
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} mb-2">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('index') }}">
                <input type="hidden" name="lang" value="{{ lang }}">
                <div class="mb-3">
                    <label for="email" class="form-label">{{ t["email_label"] }}</label>
                    <input type="email" id="email" name="email" value="{{ email }}" class="form-control" placeholder="{{ t['email_placeholder'] }}" required>
                </div>
                <div class="mb-4">
                    <label for="phone" class="form-label">{{ t["phone_label"] }}</label>
                    <input type="text" id="phone" name="phone" value="{{ phone }}" class="form-control" placeholder="{{ t['phone_placeholder'] }}" required>
                </div>
                <div class="mb-4 consent-box">
                    <div class="form-check mb-3">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            value="on"
                            id="privacy_consent"
                            name="privacy_consent"
                            {% if privacy_consent %}checked{% endif %}
                            required
                        >
                        <label class="form-check-label" for="privacy_consent">
                            {{ t["privacy_consent_prefix"] }}
                            <a href="https://www.isikun.edu.tr/ik/kisisel-verilerin-korunmasina-yonelik-aydinlatma-ve-gizlilik-politikamiz" target="_blank" rel="noopener noreferrer">{{ t["privacy_consent_link_text"] }}</a>
                            {{ t["privacy_consent_suffix"] }}
                        </label>
                    </div>
                    <hr class="my-3">
                    <p class="mb-2">{{ t["privacy_consent_text"] }}</p>
                    <div class="form-check">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            value="on"
                            id="info_consent"
                            name="info_consent"
                            {% if info_consent %}checked{% endif %}
                            required
                        >
                        <label class="form-check-label" for="info_consent">
                            {{ t["info_consent_label"] }}
                        </label>
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">{{ t["continue_button"] }}</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('admin_login', lang=lang) }}" class="btn btn-outline-secondary btn-sm">Admin Girişi</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('lang-switch').addEventListener('change', function () {
            window.location.href = '{{ url_for("index") }}?lang=' + this.value;
        });
    </script>
</body>
</html>
