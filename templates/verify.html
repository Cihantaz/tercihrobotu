<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doğrulama - {{ t["page_title"] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #f4f8fc 0%, #e6eef6 100%);
            color: #16324b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-shell {
            width: min(100%, 520px);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(22, 50, 75, 0.08);
            border-radius: 28px;
            box-shadow: 0 26px 50px rgba(22, 50, 75, 0.12);
            padding: 28px;
        }
        .brand-logo {
            display: block;
            max-width: 220px;
            width: 100%;
            margin: 0 auto 18px;
        }
        .letter-spacing-2 {
            letter-spacing: 0.5em;
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <img src="{{ url_for('static', filename='iu.logo.png') }}" alt="Isik Universitesi Logo" class="brand-logo">
            
            <div class="text-center mb-4">
                <h1 class="h4 mb-2">E-posta Doğrulama</h1>
                <p class="text-secondary mb-0"><b>{{ email }}</b> adresine 6 haneli bir doğrulama kodu gönderdik.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-3">
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} mb-2">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('verify_code') }}">
                <input type="hidden" name="lang" value="{{ lang }}">
                <div class="mb-4">
                    <label for="code" class="form-label">Doğrulama Kodu</label>
                    <input type="text" id="code" name="code" class="form-control text-center fs-4 letter-spacing-2" placeholder="000000" maxlength="6" pattern="\d{6}" required autocomplete="one-time-code">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-medium">
                    Doğrula ve Devam Et
                </button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{{ url_for('index', lang=lang) }}" class="text-decoration-none text-muted small">İptal ve Geri Dön</a>
            </div>
        </div>
    </div>
</body>
</html>
